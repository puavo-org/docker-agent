name: ${DOCKER_AGENT_PROJECT:-docker-agent}

services:
  agent:
    build:
      context: .
      args:
        BASE_IMAGE: ${DOCKER_AGENT_BASE_IMAGE}
        DOCKER_AGENT_UID: ${DOCKER_AGENT_UID:?}
        DOCKER_AGENT_GID: ${DOCKER_AGENT_GID:?}
        DOCKER_AGENT_USERNAME: ${USER}
    image: ${DOCKER_AGENT_IMAGE}
    container_name: ${DOCKER_AGENT_NAME}
    network_mode: ${DOCKER_AGENT_NETWORK_MODE:-bridge}
    runtime: ${DOCKER_AGENT_RUNTIME}
    user: "${DOCKER_AGENT_UID:?}:${DOCKER_AGENT_GID:?}"
    group_add:
      - ${DOCKER_AGENT_DOCKER_GID:-0}
      - ${DOCKER_AGENT_KVM_GID:-0}
    environment:
      HOME: ${HOME}
      USER: ${USER}
      XDG_RUNTIME_DIR: ${DOCKER_AGENT_XDG_RUNTIME_DIR:-/run/user/${DOCKER_AGENT_UID:?}}
      SSH_AUTH_SOCK: ${DOCKER_AGENT_SSH_AUTH_SOCK:-}
      HINDSIGHT_BASE_URL: ${DOCKER_AGENT_HINDSIGHT_BASE_URL:-http://host.docker.internal:8888}
    extra_hosts:
      - "host.docker.internal:${DOCKER_AGENT_HOST_GATEWAY:-host-gateway}"
    working_dir: ${HOME}
    volumes:
      - type: bind
        source: ${HOME}
        target: ${HOME}
      - type: bind
        source: ${DOCKER_AGENT_SOCKET:-/var/run/docker.sock}
        target: /var/run/docker.sock
      - type: bind
        source: ${DOCKER_AGENT_XDG_RUNTIME_DIR:-/run/user/${DOCKER_AGENT_UID:?}}
        target: ${DOCKER_AGENT_XDG_RUNTIME_DIR:-/run/user/${DOCKER_AGENT_UID:?}}
        read_only: true
        bind:
          create_host_path: false
    devices:
      - /dev/kvm:/dev/kvm
