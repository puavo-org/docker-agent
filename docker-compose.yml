name: ${DOCKER_AGENT_PROJECT:-docker-agent}

services:
  agent:
    build:
      context: .
      args:
        BASE_IMAGE: ${DOCKER_AGENT_BASE_IMAGE}
        DOCKER_AGENT_UID: ${DOCKER_AGENT_UID:?}
        DOCKER_AGENT_GID: ${DOCKER_AGENT_GID:?}
        DOCKER_AGENT_USERNAME: ${USER}
    image: ${DOCKER_AGENT_IMAGE}
    container_name: ${DOCKER_AGENT_NAME}
    network_mode: ${DOCKER_AGENT_NETWORK_MODE:-bridge}
    runtime: ${DOCKER_AGENT_RUNTIME}
    user: "${DOCKER_AGENT_UID:?}:${DOCKER_AGENT_GID:?}"
    group_add:
      - ${DOCKER_AGENT_DOCKER_GID:-0}
      - ${DOCKER_AGENT_KVM_GID:-0}
    environment:
      HOME: ${HOME}
      USER: ${USER}
    working_dir: ${HOME}
    volumes:
      - type: bind
        source: ${HOME}
        target: ${HOME}
      - type: bind
        source: ${DOCKER_AGENT_SOCKET:-/var/run/docker.sock}
        target: /var/run/docker.sock
    devices:
      - /dev/kvm:/dev/kvm
